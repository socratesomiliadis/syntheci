services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: syntheci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syntheci
      POSTGRES_PASSWORD: syntheci
      POSTGRES_DB: syntheci
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/db/migrations/0000_init.sql:/docker-entrypoint-initdb.d/0000_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntheci -d syntheci"]
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: syntheci-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: syntheci-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    container_name: syntheci-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/syntheci-files || true &&
      mc anonymous set download local/syntheci-files || true
      "

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: syntheci-web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
      DATABASE_URL: postgres://syntheci:syntheci@postgres:5432/syntheci
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: syntheci-files
      MINIO_PUBLIC_URL: http://localhost:9000
      BETTER_AUTH_SECRET: replace-with-long-random-secret
      BETTER_AUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: replace-me
      GOOGLE_CLIENT_SECRET: replace-me
      GOOGLE_PUBSUB_VERIFICATION_TOKEN: replace-me
      GOOGLE_PUBSUB_TOPIC: projects/your-project/topics/gmail-push
      GOOGLE_PUBSUB_SUBSCRIPTION: projects/your-project/subscriptions/gmail-push-sub
      SLACK_CLIENT_ID: replace-me
      SLACK_CLIENT_SECRET: replace-me
      SLACK_SIGNING_SECRET: replace-me
      SLACK_REDIRECT_URI: http://localhost:3000/api/connect/slack/callback
      OPENAI_API_KEY: replace-me
      OPENAI_CHAT_MODEL: gpt-4.1-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    container_name: syntheci-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      APP_BASE_URL: http://localhost:3000
      DATABASE_URL: postgres://syntheci:syntheci@postgres:5432/syntheci
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: syntheci-files
      BETTER_AUTH_SECRET: replace-with-long-random-secret
      GOOGLE_CLIENT_ID: replace-me
      GOOGLE_CLIENT_SECRET: replace-me
      OPENAI_API_KEY: replace-me
      OPENAI_CHAT_MODEL: gpt-4.1-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      WORKER_CONCURRENCY: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
